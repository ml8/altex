# Google-managed SSL certificate for GKE Ingress.
#
# IMPORTANT: You must update the spec.domains list with your actual domain name.
# The certificate provisioning process takes ~30-60 minutes after DNS records are updated.
#
# See: https://cloud.google.com/kubernetes-engine/docs/how-to/managed-certs

apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: altex-cert
spec:
  domains:
    - altex.ml8.sh  # REPLACE THIS with your domain
